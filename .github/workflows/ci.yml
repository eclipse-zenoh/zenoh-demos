name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          docker-images: false
          swap-storage: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://zenoh-demos.cachix.org
            extra-trusted-public-keys = zenoh-demos.cachix.org-1:baraQ3XIIgG575MordmLG+jQ21dLQB0JH30LFPQ/Xdg=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: zenoh-demos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: nix flake check
        run: nix flake check -j4 --print-build-logs

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          docker-images: false
          swap-storage: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://zenoh-demos.cachix.org
            extra-trusted-public-keys = zenoh-demos.cachix.org-1:baraQ3XIIgG575MordmLG+jQ21dLQB0JH30LFPQ/Xdg=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: zenoh-demos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Build all Rust packages
        run: |
          nix build \
            .#zlidar \
            .#zenoh-rust-replay \
            .#zenoh-dds-shapes \
            .#zenoh-shamir-put \
            .#zenoh-shamir-queryable \
            .#zenoh-tetris-server \
            .#zenoh-tetris-client \
            .#zenoh-tetris-hotseat \
            .#zenoh-rust-teleop \
            .#zcam \
            --print-build-logs -j4
